<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>元精灵 - 终极像素吉祥物设计稿</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --subtext: #94a3b8;
      --accent: #38bdf8;
      --border: #334155;
    }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
      margin: 0;
    }
    .header {
      text-align: center;
      margin-bottom: 50px;
    }
    .header h1 {
      margin: 0 0 10px 0;
      font-size: 32px;
      letter-spacing: 2px;
    }
    .header p {
      color: var(--subtext);
      font-size: 16px;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px 20px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: 0 12px 24px -10px rgba(56, 189, 248, 0.3);
    }
    .canvas-wrapper {
      margin: 0 auto 20px;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #334155 0%, #0f172a 100%);
      border-radius: 24px;
      box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
      border: 1px solid #475569;
    }
    canvas {
      image-rendering: pixelated;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .title {
      font-size: 22px;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .desc {
      font-size: 14px;
      color: var(--subtext);
      line-height: 1.5;
      margin-bottom: 20px;
      height: 42px;
    }
    .taskbar-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      background: #0f172a;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-top: 10px;
    }
    .taskbar-preview span {
      font-size: 12px;
      color: #64748b;
    }
    .taskbar-icon {
      width: 24px;
      height: 24px;
      background: #1e293b;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .taskbar-icon canvas {
      animation: none; /* No float in taskbar */
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>专业像素吉祥物设计（V3 终稿）</h1>
    <p>非常抱歉之前生成的程序化图形让您觉得粗糙。这次我彻底摒弃了代码自动生成，采用<b>纯手工逐像素绘制（16x16 标准网格）</b>，为您精心设计了 6 款不同风格的高质量像素吉祥物。它们在任务栏的 24x24 极小尺寸下也能保持极高的辨识度和可爱的表情。</p>
  </div>

  <div class="grid" id="container"></div>

  <script>
    const SCALE_LARGE = 8; // 16 * 8 = 128px
    const SCALE_SMALL = 1.5; // 16 * 1.5 = 24px

    // 6 Distinct High-Quality Pixel Art Designs
    const designs = [
      {
        id: "cyber",
        name: "1. 赛博小电视",

        colors: { '.': null, 'O': '#0f172a', 'B': '#06b6d4', 'L': '#67e8f9', 'S': '#1e293b', 'W': '#e0f2fe', 'P': '#0891b2', 'A': '#fcd34d', 'D': '#0891b2' },
        pixels: [
          ".......OO.......",
          "......OAAO......",
          ".....OABBBAO....",
          "...OOOOOOOOOO...",
          "..OLLLLLLLLLLO..",
          ".OLBBBBBBBBBBBO.",
          ".OLBSSSSSSSSBBO.",
          ".OLBSWWSBBSWWSBO",
          ".OLBSWPSBBSWPSBO",
          ".OLBSSSSSSSSSBBO",
          ".OLBBBBBBBBBBBO.",
          "..ODDDDDDDDDDO..",
          "...OOOOOOOOOO...",
          "....O......O....",
          "...OO......OO...",
          "................"
        ]
      },
      {
        id: "cat",
        name: "2. 招财喵",
        desc: "股票必备的招财属性。白红金配色，竖耳，吉利且讨喜。",
        colors: { '.': null, 'O': '#271c19', 'W': '#fffdf5', 'G': '#fbbf24', 'R': '#ef4444', 'P': '#fca5a5', 'E': '#271c19' },
        pixels: [
          "....O........O..",
          "...OWO......OWO.",
          "..OWRWO....OWRWO",
          "..OWWWOOOOOOWWWO",
          ".OWWWWWWWWWWWWW.",
          ".OWWWWWWWWWWWWWO",
          ".OWWEWWWWWWWWEWO",
          ".OWWWWWOWOWWWWWO",
          ".OWPWWWWWWWWWPWO",
          ".OWWWWWWWWWWWWWO",
          "..OWWWGGGGGGWWO.",
          "..OWWWGOGOGGWWO.",
          "...OWWGGGGGGWO..",
          "....OOOOOOOOO...",
          "................",
          "................"
        ]
      },
      {
        id: "fox",
        name: "3. 灵狐宝宝",
        desc: "机敏聪慧的小狐狸/柴犬，宽脸颊大耳朵，代表着对市场敏锐的嗅觉。",
        colors: { '.': null, 'O': '#2e1905', 'Y': '#f59e0b', 'L': '#fde68a', 'W': '#ffffff', 'E': '#2e1905', 'P': '#fca5a5' },
        pixels: [
          "...OO........OO.",
          "..OYLO......OYLO",
          "..OYLLO....OYLLO",
          ".OYLLLYOOOOYLLLY",
          ".OYLLYYYYYYYYLLY",
          ".OYYYYYYYYYYYYYO",
          ".OYYEYYYYYYYYEYO",
          ".OYYYYYYWWYYYYYO",
          ".OYYPWWWOWWWWPYO",
          ".OYYWWWWWWWWWWYO",
          "..OYWWWWWWWWWWYO",
          "...OOWWWWWWWWOO.",
          "....OOOOOOOOOO..",
          "................",
          "................",
          "................"
        ]
      },
      {
        id: "slime",
        name: "4. 史莱姆滴滴",
        desc: "圆润无棱角的软萌水滴，经典 RPG 风格，动态感极强。",
        colors: { '.': null, 'O': '#064e3b', 'B': '#10b981', 'L': '#6ee7b7', 'D': '#047857', 'W': '#ffffff', 'E': '#064e3b', 'P': '#a7f3d0' },
        pixels: [
          "................",
          "......OOOO......",
          "....OOLLLLO.....",
          "...OLLBBBBLOO...",
          "..OLBBBBBBBBBO..",
          ".OLBBBBBBBBBBBO.",
          ".OLBWWBBPWWBHBO.",
          ".LBWEBBBPWEBHBBO",
          ".LBBBBBBBBBBBBBO",
          ".LBBBBBBBBBBBBBO",
          ".LBPBBBBBBBBBPBO",
          ".OBBBBBBBBBBBBBO",
          ".ODDBBBBBBBBBBDO",
          "..ODDDDDDDDDDDO.",
          "...OOOOOOOOOOO..",
          "................"
        ]
      },
      {
        id: "ghost",
        name: "5. 小幽灵",
        desc: "轻盈悬浮的小幽灵，拖着小尾巴。适合暗色主题的神秘精灵。",
        colors: { '.': null, 'O': '#1e1b4b', 'W': '#f8fafc', 'L': '#ffffff', 'D': '#cbd5e1', 'B': '#93c5fd', 'E': '#1e1b4b', 'P': '#fca5a5' },
        pixels: [
          "......OOOO......",
          "....OOLLLLO.....",
          "...OLLWWWWLOO...",
          "..OLWWWWWWWWWO..",
          ".OLWWWWWWWWWWWO.",
          ".OLWWWWWWWWWWWO.",
          ".OLWBEWWBWBEWWO.",
          ".OLWWWWWWWWWWWO.",
          ".OLWPWWWWWWWPWO.",
          ".OLWWWWWWWWWWWO.",
          "..ODWWWWWWWWWDO.",
          "...ODDDDDDDWDO..",
          "....OOOOOODWDO..",
          ".........ODDO...",
          ".........OO.....",
          "................"
        ]
      },
      {
        id: "monster",
        name: "6. 小怪兽 (优化版)",
        desc: "基于您之前的截图，重新精调了比例、高光和嘴唇弧度，更饱满生动。",
        colors: { '.': null, 'O': '#271c19', 'M': '#f97316', 'L': '#fdba74', 'W': '#ffffff', 'E': '#271c19', 'B': '#fca5a5', 'D': '#c2410c' },
        pixels: [
          "......OOOO......",
          ".....OLLLLO.....",
          "....OLMMMMMO....",
          "...OLMMMMMMMO...",
          "..OLMMMMMMMMMO..",
          ".OLMMMMMMMMMMMO.",
          ".OLMWEWMMMMWEWO.",
          ".OLMWWWMMMMWWWO.",
          ".OLMMMMMMMMMMMO.",
          ".OLMBMMMMMMMBMO.",
          "..OMMMMMMMMMMMO.",
          "...OMMMMMMMMMO..",
          "....OOOOOOOOO...",
          ".....O.....O....",
          "....OO.....OO...",
          "................"
        ]
      }
    ];

    function drawArt(ctx, design, scale) {
      ctx.clearRect(0, 0, 16*scale, 16*scale);
      for (let y = 0; y < 16; y++) {
        for (let x = 0; x < 16; x++) {
          const char = design.pixels[y][x];
          const color = design.colors[char];
          if (color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * scale, y * scale, scale, scale);
          }
        }
      }
    }

    const container = document.getElementById('container');
    
    designs.forEach(d => {
      const card = document.createElement('div');
      card.className = 'card';
      
      const wrapper = document.createElement('div');
      wrapper.className = 'canvas-wrapper';
      
      const canvasBig = document.createElement('canvas');
      canvasBig.width = 16 * SCALE_LARGE;
      canvasBig.height = 16 * SCALE_LARGE;
      const ctxBig = canvasBig.getContext('2d');
      drawArt(ctxBig, d, SCALE_LARGE);
      wrapper.appendChild(canvasBig);
      
      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = d.name;
      
      const desc = document.createElement('div');
      desc.className = 'desc';
      desc.textContent = d.desc;

      const taskbar = document.createElement('div');
      taskbar.className = 'taskbar-preview';
      taskbar.innerHTML = `<span>任务栏尺寸模拟:</span>`;
      
      const tbIcon = document.createElement('div');
      tbIcon.className = 'taskbar-icon';
      const canvasSmall = document.createElement('canvas');
      canvasSmall.width = 16 * SCALE_SMALL;
      canvasSmall.height = 16 * SCALE_SMALL;
      const ctxSmall = canvasSmall.getContext('2d');
      drawArt(ctxSmall, d, SCALE_SMALL);
      tbIcon.appendChild(canvasSmall);
      taskbar.appendChild(tbIcon);

      card.appendChild(wrapper);
      card.appendChild(title);
      card.appendChild(desc);
      card.appendChild(taskbar);
      container.appendChild(card);
    });
  </script>
</body>
</html>
